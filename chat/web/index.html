<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knowledge Assistant</title>
<style>
  :root {
    --bg: #f7f7f8; --panel: #fff; --ink: #1a1a1a; --muted: #6b7280;
    --line: #e5e7eb; --accent: #2563eb; --ok: #047857; --warn: #b45309; --bad: #b91c1c;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0f1115; --panel:#171a21; --ink:#e8e8ea; --muted:#9aa1ad;
            --line:#262b34; --accent:#5b8cff; }
  }
  * { box-sizing: border-box; }
  body { margin:0; font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--ink); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel);
           display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .meta { color:var(--muted); font-size:13px; }
  header .spacer { flex:1; }
  header input { padding:6px 8px; border:1px solid var(--line); border-radius:6px;
                 background:var(--bg); color:var(--ink); font-size:13px; width:200px; }
  main { max-width:820px; margin:0 auto; padding:20px; }
  #log { display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
  .msg { display:flex; flex-direction:column; gap:6px; }
  .msg .who { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .bubble { padding:12px 14px; border-radius:10px; border:1px solid var(--line);
            background:var(--panel); white-space:pre-wrap; }
  .msg.you .bubble { background:var(--accent); color:#fff; border-color:transparent; align-self:flex-end;
                     max-width:80%; }
  .msg.you { align-items:flex-end; }
  .prov { margin-top:2px; font-size:13px; border:1px dashed var(--line); border-radius:8px;
          padding:8px 12px; background:transparent; }
  .prov h4 { margin:0 0 4px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .prov ul { margin:0; padding-left:18px; }
  .prov .none { color:var(--muted); }
  .prov .bad { color:var(--bad); font-weight:600; }
  form { display:flex; gap:8px; position:sticky; bottom:0; padding:12px 0; background:var(--bg); }
  #q { flex:1; padding:12px; border:1px solid var(--line); border-radius:8px; font-size:16px;
       background:var(--panel); color:var(--ink); }
  button { padding:0 16px; border:0; border-radius:8px; background:var(--accent); color:#fff;
           font-size:15px; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  #mic { background:var(--panel); color:var(--ink); border:1px solid var(--line); min-width:48px; }
  #mic.rec { background:var(--bad); color:#fff; border-color:transparent; }
  .hint { color:var(--muted); font-size:13px; padding:4px 0 16px; }
</style>
</head>
<body>
<header>
  <h1>Knowledge Assistant</h1>
  <span class="meta" id="meta">connecting…</span>
  <span class="spacer"></span>
  <input id="token" type="password" placeholder="access token" title="Access token (if required)">
</header>
<main>
  <div class="hint">
    Answers come only from the project's knowledge notes. Each answer shows the exact notes
    it rests on and their status — draft answers are flagged, and the assistant will say when
    something isn't covered rather than guess.
  </div>
  <div id="log"></div>
  <form id="f">
    <button id="mic" type="button" title="Hold to speak">🎤</button>
    <input id="q" autocomplete="off" placeholder="Ask a question…">
    <button id="send" type="submit">Send</button>
  </form>
</main>
<script>
const log = document.getElementById('log');
const meta = document.getElementById('meta');
const tokenEl = document.getElementById('token');
const qEl = document.getElementById('q');
const micBtn = document.getElementById('mic');
const sendBtn = document.getElementById('send');
let voiceEnabled = false;

function authHeaders(extra) {
  const h = Object.assign({}, extra || {});
  const t = tokenEl.value.trim();
  if (t) h['Authorization'] = 'Bearer ' + t;
  return h;
}

function add(who, cls, text) {
  const m = document.createElement('div');
  m.className = 'msg ' + cls;
  m.innerHTML = '<div class="who"></div><div class="bubble"></div>';
  m.querySelector('.who').textContent = who;
  m.querySelector('.bubble').textContent = text;
  log.appendChild(m);
  m.scrollIntoView({behavior:'smooth', block:'end'});
  return m;
}

function addProvenance(afterEl, data) {
  const p = document.createElement('div');
  p.className = 'prov';
  let html = '<h4>Sources</h4>';
  const cites = data.citations || [];
  if (data.citations_fabricated && data.citations_fabricated.length) {
    html += '<div class="bad">⚠ answer referenced note(s) that do not exist: '
          + data.citations_fabricated.join(', ') + '</div>';
  }
  if (cites.length) {
    html += '<ul>' + cites.map(c => '<li>' + c + '</li>').join('') + '</ul>';
    if (data.provenance) html += '<div class="none">' + escapeHtml(data.provenance) + '</div>';
  } else if (data.provenance) {
    html += '<div class="none">' + escapeHtml(data.provenance) + '</div>';
  } else {
    html += '<div class="none">No notes cited — not covered by the knowledge base.</div>';
  }
  p.innerHTML = html;
  afterEl.appendChild(p);
  p.scrollIntoView({behavior:'smooth', block:'end'});
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function ask(question) {
  add('You', 'you', question);
  sendBtn.disabled = true;
  const thinking = add('Assistant', 'bot', '…');
  try {
    const r = await fetch('/api/ask', {
      method:'POST', headers: authHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({question})
    });
    const data = await r.json();
    if (!r.ok) { thinking.querySelector('.bubble').textContent = 'Error: ' + (data.error||r.status); return; }
    thinking.querySelector('.bubble').textContent = data.spoken || '(no answer)';
    addProvenance(thinking, data);
    if (voiceEnabled && data.spoken) speak(data.spoken);
  } catch (e) {
    thinking.querySelector('.bubble').textContent = 'Error: ' + e.message;
  } finally {
    sendBtn.disabled = false;
  }
}

async function speak(text) {
  try {
    const r = await fetch('/api/speak', {
      method:'POST', headers: authHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({text})
    });
    if (!r.ok) return;
    const blob = await r.blob();
    new Audio(URL.createObjectURL(blob)).play().catch(()=>{});
  } catch (e) { /* audio is best-effort */ }
}

document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  const q = qEl.value.trim();
  if (!q) return;
  qEl.value = '';
  ask(q);
});

// --- push-to-talk ------------------------------------------------------------------
let recorder, chunks;
async function startRec() {
  if (!voiceEnabled) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recorder = new MediaRecorder(stream);
    chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, {type: recorder.mimeType || 'audio/webm'});
      micBtn.classList.remove('rec');
      const r = await fetch('/api/transcribe', {
        method:'POST',
        headers: authHeaders({'Content-Type': blob.type, 'X-Audio-Filename':'question.webm'}),
        body: blob
      });
      const data = await r.json();
      if (r.ok && data.text) { qEl.value = data.text; ask(data.text); qEl.value=''; }
      else add('Assistant','bot','Could not transcribe: ' + (data.error||r.status));
    };
    recorder.start();
    micBtn.classList.add('rec');
  } catch (e) { add('Assistant','bot','Microphone unavailable: ' + e.message); }
}
function stopRec() { if (recorder && recorder.state === 'recording') recorder.stop(); }
micBtn.addEventListener('mousedown', startRec);
micBtn.addEventListener('mouseup', stopRec);
micBtn.addEventListener('mouseleave', stopRec);
micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRec(); });
micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRec(); });

// --- boot --------------------------------------------------------------------------
fetch('/api/health').then(r=>r.json()).then(h => {
  voiceEnabled = !!h.voice_enabled;
  meta.textContent = 'model: ' + (h.model||'?') + ' · voice: ' + (voiceEnabled?'on':'off')
                   + (h.auth_required ? ' · token required' : '');
  micBtn.style.display = voiceEnabled ? '' : 'none';
  tokenEl.style.display = h.auth_required ? '' : 'none';
}).catch(()=>{ meta.textContent = 'server unreachable'; });
</script>
</body>
</html>
